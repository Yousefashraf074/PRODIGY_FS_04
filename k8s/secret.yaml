# Secrets for Neon Chat Application
# Contains sensitive configuration data
# NOTE: In production, use a secrets management solution like:
# - Kubernetes Secrets Store CSI Driver
# - HashiCorp Vault
# - AWS Secrets Manager
# - Azure Key Vault

apiVersion: v1
kind: Secret
metadata:
  name: neon-chat-secrets
  namespace: neon-chat
  labels:
    app: neon-chat
type: Opaque
# Base64 encoded values
# Use: echo -n 'your-value' | base64
stringData:
  # PostgreSQL password
  POSTGRES_PASSWORD: "postgres123"

  # JWT Secret (CHANGE THIS IN PRODUCTION!)
  JWT_SECRET: "your-super-secret-jwt-key-change-in-production-use-256-bits-minimum"

  # Database URL (constructed from other values)
  DATABASE_URL: "postgresql://postgres:postgres123@postgres-service:5432/neon_chat?schema=public"

---
