# Frontend Service for Neon Chat
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: neon-chat
  labels:
    app: neon-chat
    component: frontend
spec:
  type: ClusterIP
  selector:
    app: neon-chat
    component: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
